<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="stylesheet" href="./style.css">
  
</head>
<body>


  <div class="container">
    <div class="header">
      <form action="" class="header-search" method="post">
        <label for="search"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
          viewBox="0 0 256 256"><path d="M229.66,218.34l-50.07-50.06a88.11,88.11,0,1,0-11.31,11.31l50.06,50.07a8,8,0,0,0,11.32-11.32ZM40,112a72,72,0,1,1,72,72A72.08,72.08,0,0,1,40,112Z"></path></svg></label>
        <input type="search" name="search" id="search">
      </form>
      <h1>Your Library</h1>
    </div>
    <nav class="sidebar">
      <ul class="sidebar-menu">
        <li><button id="home" title="Home"><span>Home</span></button></li>
        <li><button id="show-read" title="Show Read"><span>Read</span></button></li>
        <li><button id="show-unread" title="Show Unread"><span>Unread</span></button></li>
        <li><button id="new-book" title="Add Book"><span>Add Book</span></button></li>
      </ul>
      <footer class="footer">
        <p>Make with ❤️ by <a href="https://github.com/Taaccii" target="_blank" rel="noopener noreferrer">Tacci</a> Copyright © 2026</p>
      </footer>
    </nav>
   

    <div class="main-content">
      <div class="card-book">

      </div>
    </div>
  </div>

  <dialog id="book-modal">
    <form method="dialog" id="book-form">
      <h2>Add New Book</h2>
      <input type="text" id="modal-title" placeholder="Title" required>
      <input type="text" id="modal-author" placeholder="Author" required>
      <input type="text" id="modal-pages" placeholder="Pages" required>

      <label>
        <input type="checkbox" id="modal-read"> Have you read it?
      </label>

      <div class="modal-buttons">
        <button type="button" id="close-modal">Cancel</button>
        <button type="submit" id="submit-book">Add to Library</button>
      </div>
    </form>
  </dialog>


  <script src="./index.js"></script>
</body>
</html>
