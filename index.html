<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="stylesheet" href="./style.css">
  
</head>
<body>


  <div class="container">
    <div class="header">
      <form action="" class="header-search" method="post">
        <label for="search"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"

        <input type="search" name="search" id="search">
      </form>
      <h1>Your Library</h1>
    </div>
    <div class="sidebar">
      <ul class="menu">
        <li><button id="home">HOME</button></li>
        <li><button id="show-read">READ</button></li>
        <li><button id="show-unread">NOT READ</button></li>
        <li><button id="new-book">ADD A BOOK</button></li>
      </ul>
      <footer class="footer">
        <p>Make with ❤️ by <a href="https://github.com/Taaccii" target="_blank" rel="noopener noreferrer">Tacci</a> Copyright © 2026</p>
      </footer>
    </div>
   

    <div class="main-content">
      <div class="card-book">

      </div>
    </div>

  </div>


  <script src="./index.js"></script>

</html>
